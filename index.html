<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="矢野佳ニ（接骨院院長）のプロフィールページ。神経整体・ホームページ制作・旅行を軸に、AIで仕事をもっと良くすることを目指しています。">
<meta name="theme-color" content="#1f3d2e">
<title>矢野 佳ニ | 接骨院院長</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Shippori+Mincho:wght@600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf7f0;
    --surface: #ffffff;
    --ink: #1c1f1c;
    --ink-soft: #5c6b60;
    --pine: #1f3d2e;
    --pine-soft: #2c5240;
    --gold: #b9935a;
    --gold-soft: #f4ead9;
    --border: #e9e3d4;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    font-family: "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.9;
    -webkit-font-smoothing: antialiased;
  }

  img, svg {
    display: block;
  }

  a {
    color: inherit;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 0 24px;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ---------- Hero ---------- */

  .hero {
    position: relative;
    min-height: 92vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: #fff;
    background:
      radial-gradient(circle at 20% 20%, rgba(185, 147, 90, 0.18), transparent 45%),
      radial-gradient(circle at 80% 75%, rgba(185, 147, 90, 0.12), transparent 40%),
      linear-gradient(160deg, var(--pine) 0%, var(--pine-soft) 100%);
    overflow: hidden;
    padding: 80px 24px 64px;
  }

  .hero::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: radial-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px);
    background-size: 26px 26px;
    opacity: 0.5;
    pointer-events: none;
  }

  .hero-inner {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.28em;
    color: var(--gold);
    text-transform: uppercase;
    opacity: 0;
    animation: fadeInUp 0.8s ease 0.1s forwards;
  }

  .eyebrow::before,
  .eyebrow::after {
    content: "";
    width: 28px;
    height: 1px;
    background: var(--gold);
    opacity: 0.7;
  }

  .hero-name {
    margin-top: 24px;
    font-family: "Shippori Mincho", "Noto Sans JP", serif;
    font-size: clamp(40px, 8vw, 68px);
    font-weight: 600;
    letter-spacing: 0.08em;
    opacity: 0;
    animation: fadeInUp 0.8s ease 0.25s forwards;
  }

  .hero-role {
    margin-top: 14px;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.12em;
    color: rgba(255, 255, 255, 0.78);
    opacity: 0;
    animation: fadeInUp 0.8s ease 0.4s forwards;
  }

  .hero-quote {
    position: relative;
    margin-top: 48px;
    max-width: 520px;
    font-size: clamp(19px, 3vw, 24px);
    font-weight: 700;
    letter-spacing: 0.04em;
    padding: 0 44px;
    opacity: 0;
    animation: fadeInUp 0.8s ease 0.55s forwards;
  }

  .hero-quote .mark {
    position: absolute;
    top: -18px;
    font-family: "Shippori Mincho", serif;
    font-size: 56px;
    color: var(--gold);
    opacity: 0.6;
    line-height: 1;
  }

  .hero-quote .mark.open { left: -4px; }
  .hero-quote .mark.close { right: -4px; bottom: -34px; top: auto; transform: rotate(180deg); }

  .scroll-cue {
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    width: 22px;
    height: 36px;
    border: 2px solid rgba(255, 255, 255, 0.5);
    border-radius: 999px;
    display: flex;
    justify-content: center;
    padding-top: 6px;
  }

  .scroll-cue span {
    width: 4px;
    height: 8px;
    background: var(--gold);
    border-radius: 999px;
    animation: scrollDown 1.6s ease infinite;
  }

  @keyframes scrollDown {
    0%   { transform: translateY(0); opacity: 1; }
    70%  { opacity: 0; }
    100% { transform: translateY(10px); opacity: 0; }
  }

  /* ---------- Sections ---------- */

  section {
    padding: 96px 0;
  }

  .section-head {
    text-align: center;
    margin-bottom: 56px;
  }

  .section-label {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.24em;
    color: var(--gold);
    text-transform: uppercase;
  }

  .section-title {
    margin-top: 12px;
    font-size: clamp(24px, 4vw, 32px);
    font-weight: 700;
    color: var(--ink);
    letter-spacing: 0.04em;
  }

  /* ---------- Interests ---------- */

  .interests-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
  }

  .interest-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 36px 24px;
    text-align: center;
    transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
  }

  .interest-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 20px 40px rgba(31, 61, 46, 0.1);
    border-color: var(--gold-soft);
  }

  .interest-icon {
    width: 56px;
    height: 56px;
    margin: 0 auto 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    background: var(--gold-soft);
    color: var(--pine);
  }

  .interest-icon svg {
    width: 26px;
    height: 26px;
  }

  .interest-title {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.03em;
  }

  .interest-desc {
    margin-top: 8px;
    font-size: 13.5px;
    color: var(--ink-soft);
    letter-spacing: 0.02em;
  }

  /* ---------- CTA ---------- */

  .cta {
    background: linear-gradient(160deg, var(--pine) 0%, var(--pine-soft) 100%);
    color: #fff;
    text-align: center;
  }

  .cta .section-title {
    color: #fff;
  }

  .cta p {
    max-width: 480px;
    margin: 18px auto 0;
    color: rgba(255, 255, 255, 0.78);
    font-size: 15px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-top: 36px;
    background: var(--gold);
    color: var(--pine);
    text-decoration: none;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.04em;
    padding: 16px 34px;
    border-radius: 999px;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    box-shadow: 0 12px 30px rgba(185, 147, 90, 0.35);
  }

  .btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 16px 36px rgba(185, 147, 90, 0.45);
  }

  .btn svg {
    width: 16px;
    height: 16px;
  }

  /* ---------- Footer ---------- */

  footer {
    padding: 32px 24px;
    text-align: center;
    font-size: 12.5px;
    letter-spacing: 0.05em;
    color: var(--ink-soft);
    background: var(--bg);
  }

  /* ---------- Responsive ---------- */

  @media (max-width: 680px) {
    .interests-grid {
      grid-template-columns: 1fr;
    }

    section {
      padding: 72px 0;
    }

    .hero {
      min-height: 100vh;
    }
  }
</style>
</head>
<body>

  <header class="hero">
    <div class="hero-inner">
      <p class="eyebrow">Profile</p>
      <h1 class="hero-name">矢野 佳ニ</h1>
      <p class="hero-role">接骨院院長</p>
      <p class="hero-quote">
        <span class="mark open">&ldquo;</span>
        AIで仕事をもっと良くしたい
        <span class="mark close">&ldquo;</span>
      </p>
    </div>
    <div class="scroll-cue"><span></span></div>
  </header>

  <main>
    <section class="interests" id="interests">
      <div class="container">
        <div class="section-head">
          <p class="section-label">Interests</p>
          <h2 class="section-title">好きなこと</h2>
        </div>

        <div class="interests-grid">
          <div class="interest-card">
            <div class="interest-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2v20"></path>
                <path d="M8 6c0 2 4 2 4 4s-4 2-4 4 4 2 4 4"></path>
                <circle cx="12" cy="2" r="1.4" fill="currentColor" stroke="none"></circle>
              </svg>
            </div>
            <div class="interest-title">神経整体</div>
            <p class="interest-desc">身体の根本から整えるアプローチ</p>
          </div>

          <div class="interest-card">
            <div class="interest-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="13" rx="2"></rect>
                <path d="M8 21h8"></path>
                <path d="M12 17v4"></path>
                <path d="m8 9 3 3-3 3"></path>
              </svg>
            </div>
            <div class="interest-title">ホームページ制作</div>
            <p class="interest-desc">伝わるデザインとものづくり</p>
          </div>

          <div class="interest-card">
            <div class="interest-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2.5 19.5 21 12 2.5 4.5 5 11l-2.5 8.5Z"></path>
                <path d="M5 11h6"></path>
              </svg>
            </div>
            <div class="interest-title">旅行</div>
            <p class="interest-desc">新しい景色から得るひらめき</p>
          </div>
        </div>
      </div>
    </section>

    <section class="cta">
      <div class="container">
        <p class="section-label">Contact</p>
        <h2 class="section-title">SNSでつながる</h2>
        <p>最新情報や日々の発信はこちらからご覧いただけます。</p>
        <a class="btn" href="https://jp.ilb.me/yano-sekkotsuin/" target="_blank" rel="noopener noreferrer">
          SNSリンクを見る
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M7 17 17 7"></path>
            <path d="M7 7h10v10"></path>
          </svg>
        </a>
      </div>
    </section>
  </main>

  <footer>&copy; 2026 矢野 佳ニ</footer>

</body>
</html>
