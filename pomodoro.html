<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="25分集中・5分休憩を繰り返す、集中したくなる美しいポモドーロタイマー。">
<meta name="theme-color" content="#05070d">
<title>ポモドーロタイマー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  @property --accent-a {
    syntax: '<color>';
    inherits: true;
    initial-value: #fb7185;
  }

  @property --accent-b {
    syntax: '<color>';
    inherits: true;
    initial-value: #fbbf24;
  }

  :root {
    --bg: #05070d;
    --ink: #f4f6fb;
    --ink-soft: #838ca3;
    --glass: rgba(255, 255, 255, 0.045);
    --glass-border: rgba(255, 255, 255, 0.1);
    --track: rgba(255, 255, 255, 0.07);
    --accent-a: #fb7185;
    --accent-b: #fbbf24;
  }

  body.mode-break {
    --accent-a: #34d399;
    --accent-b: #22d3ee;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: "Noto Sans JP", "Hiragino Kaku Gothic ProN", sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
    position: relative;
    overflow-x: hidden;
    transition: --accent-a 0.9s ease, --accent-b 0.9s ease;
  }

  .num {
    font-family: "Space Grotesk", "Noto Sans JP", sans-serif;
  }

  /* ---------- ambient background ---------- */

  .mesh {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background: radial-gradient(circle at 15% 20%, color-mix(in srgb, var(--accent-a) 22%, transparent), transparent 42%),
                radial-gradient(circle at 85% 78%, color-mix(in srgb, var(--accent-b) 20%, transparent), transparent 45%),
                radial-gradient(circle at 50% 50%, rgba(255,255,255,0.02), transparent 60%);
    filter: blur(70px);
    transition: background 0.9s ease;
  }

  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(100px);
    opacity: 0.28;
    z-index: 0;
    pointer-events: none;
  }

  .orb-1 {
    width: 460px;
    height: 460px;
    background: var(--accent-a);
    top: -160px;
    left: -140px;
    animation: float1 16s ease-in-out infinite;
    transition: background 0.9s ease;
  }

  .orb-2 {
    width: 420px;
    height: 420px;
    background: var(--accent-b);
    bottom: -160px;
    right: -120px;
    animation: float2 18s ease-in-out infinite;
    transition: background 0.9s ease;
  }

  @keyframes float1 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50%      { transform: translate(60px, 40px) scale(1.12); }
  }

  @keyframes float2 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50%      { transform: translate(-50px, -30px) scale(1.1); }
  }

  /* ---------- card ---------- */

  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 30px;
    backdrop-filter: blur(28px);
    -webkit-backdrop-filter: blur(28px);
    box-shadow: 0 40px 90px rgba(0, 0, 0, 0.55), inset 0 1px 0 rgba(255, 255, 255, 0.07);
    padding: 40px 34px 34px;
    text-align: center;
    animation: cardIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(20px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .eyebrow {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.34em;
    color: var(--ink-soft);
    text-transform: uppercase;
  }

  .card-title {
    margin-top: 10px;
    font-size: 21px;
    font-weight: 700;
    letter-spacing: 0.03em;
  }

  .mode-badge {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    margin-top: 24px;
    padding: 9px 20px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--glass-border);
    font-size: 12.5px;
    font-weight: 700;
    letter-spacing: 0.1em;
  }

  .mode-badge .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
    box-shadow: 0 0 12px var(--accent-a);
  }

  .mode-badge.is-running .dot {
    animation: dotPulse 1.6s ease-in-out infinite;
  }

  @keyframes dotPulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50%      { transform: scale(1.5); opacity: 0.6; }
  }

  /* ---------- ring ---------- */

  .ring-wrap {
    position: relative;
    width: 272px;
    height: 272px;
    margin: 34px auto 8px;
  }

  .breath {
    position: absolute;
    inset: 18px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
    opacity: 0.14;
    filter: blur(30px);
    transition: background 0.9s ease;
  }

  .ring-wrap.is-running .breath {
    animation: breathe 4.2s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { transform: scale(0.94); opacity: 0.12; }
    50%      { transform: scale(1.08); opacity: 0.26; }
  }

  .ring-wrap svg {
    position: relative;
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }

  .ring-track {
    fill: none;
    stroke: var(--track);
    stroke-width: 11;
  }

  .ring-progress {
    fill: none;
    stroke-width: 11;
    stroke-linecap: round;
    stroke: url(#ringGradient);
    transition: stroke-dashoffset 1s linear;
    filter: drop-shadow(0 0 10px color-mix(in srgb, var(--accent-a) 55%, transparent));
  }

  .ring-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .time {
    font-size: 56px;
    font-weight: 700;
    letter-spacing: 0.02em;
    font-variant-numeric: tabular-nums;
    text-shadow: 0 0 34px color-mix(in srgb, var(--accent-a) 35%, transparent);
    transition: text-shadow 0.9s ease;
  }

  .time.tick {
    animation: tickPulse 0.4s ease;
  }

  @keyframes tickPulse {
    0%   { opacity: 0.72; }
    100% { opacity: 1; }
  }

  .time-sub {
    margin-top: 6px;
    font-size: 12px;
    color: var(--ink-soft);
    letter-spacing: 0.14em;
  }

  /* ---------- controls ---------- */

  .controls {
    display: flex;
    gap: 12px;
    margin-top: 32px;
  }

  button {
    flex: 1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.03em;
    padding: 15px 16px;
    border-radius: 15px;
    border: 1px solid var(--glass-border);
    background: rgba(255, 255, 255, 0.04);
    color: var(--ink);
    cursor: pointer;
    transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease, background 0.18s ease, border-color 0.18s ease;
  }

  button svg {
    width: 16px;
    height: 16px;
  }

  button:disabled {
    opacity: 0.32;
    cursor: not-allowed;
  }

  button:not(:disabled):hover {
    transform: translateY(-2px);
    border-color: color-mix(in srgb, var(--accent-a) 40%, var(--glass-border));
  }

  button:not(:disabled):active {
    transform: translateY(0);
  }

  #startBtn {
    background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
    background-size: 200% 200%;
    color: #05070d;
    border: none;
    box-shadow: 0 12px 30px color-mix(in srgb, var(--accent-a) 35%, transparent);
    animation: shimmer 5s ease infinite;
  }

  @keyframes shimmer {
    0%, 100% { background-position: 0% 50%; }
    50%      { background-position: 100% 50%; }
  }

  #startBtn:not(:disabled):hover {
    box-shadow: 0 16px 36px color-mix(in srgb, var(--accent-a) 45%, transparent);
  }

  footer {
    position: relative;
    z-index: 1;
    padding: 20px;
    text-align: center;
    font-size: 12px;
    color: var(--ink-soft);
  }
</style>
</head>
<body class="mode-focus">

  <div class="mesh"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="card">
    <p class="eyebrow">Pomodoro Timer</p>
    <h1 class="card-title">ポモドーロタイマー</h1>

    <div class="mode-badge" id="modeBadge">
      <span class="dot"></span>
      <span id="modeLabel">集中モード</span>
    </div>

    <div class="ring-wrap" id="ringWrap">
      <div class="breath"></div>
      <svg viewBox="0 0 200 200">
        <defs>
          <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop id="gradStop1" offset="0%" stop-color="#fb7185"></stop>
            <stop id="gradStop2" offset="100%" stop-color="#fbbf24"></stop>
          </linearGradient>
        </defs>
        <circle class="ring-track" cx="100" cy="100" r="90"></circle>
        <circle class="ring-progress" id="ringProgress" cx="100" cy="100" r="90"></circle>
      </svg>
      <div class="ring-center">
        <div class="time num" id="timeDisplay">25:00</div>
        <div class="time-sub" id="timeSub">残り時間</div>
      </div>
    </div>

    <div class="controls">
      <button id="startBtn">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"></path></svg>
        開始
      </button>
      <button id="stopBtn" disabled>
        <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14"></rect><rect x="14" y="5" width="4" height="14"></rect></svg>
        停止
      </button>
      <button id="resetBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 1 0 3-6.7"></path>
          <path d="M3 4v5h5"></path>
        </svg>
        リセット
      </button>
    </div>
  </div>

  <footer>&copy; 2026 Pomodoro Timer</footer>

  <script>
    const FOCUS_SEC = 25 * 60;
    const BREAK_SEC = 5 * 60;
    const CIRCUMFERENCE = 2 * Math.PI * 90;

    const body = document.body;
    const modeBadge = document.getElementById('modeBadge');
    const modeLabel = document.getElementById('modeLabel');
    const ringWrap = document.getElementById('ringWrap');
    const timeDisplay = document.getElementById('timeDisplay');
    const timeSub = document.getElementById('timeSub');
    const ringProgress = document.getElementById('ringProgress');
    const gradStop1 = document.getElementById('gradStop1');
    const gradStop2 = document.getElementById('gradStop2');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const resetBtn = document.getElementById('resetBtn');

    ringProgress.style.strokeDasharray = String(CIRCUMFERENCE);

    let mode = 'focus';
    let total = FOCUS_SEC;
    let remaining = FOCUS_SEC;
    let running = false;
    let timerId = null;
    let audioCtx = null;

    function formatTime(s) {
      const mm = String(Math.floor(s / 60)).padStart(2, '0');
      const ss = String(s % 60).padStart(2, '0');
      return `${mm}:${ss}`;
    }

    function updateDisplay() {
      timeDisplay.textContent = formatTime(remaining);
      const offset = CIRCUMFERENCE * (1 - remaining / total);
      ringProgress.style.strokeDashoffset = String(offset);

      if (mode === 'focus') {
        body.classList.remove('mode-break');
        body.classList.add('mode-focus');
        modeLabel.textContent = '集中モード';
        timeSub.textContent = running ? '集中中…' : '残り時間';
        gradStop1.setAttribute('stop-color', '#fb7185');
        gradStop2.setAttribute('stop-color', '#fbbf24');
      } else {
        body.classList.remove('mode-focus');
        body.classList.add('mode-break');
        modeLabel.textContent = '休憩モード';
        timeSub.textContent = running ? '休憩中…' : '残り時間';
        gradStop1.setAttribute('stop-color', '#34d399');
        gradStop2.setAttribute('stop-color', '#22d3ee');
      }

      modeBadge.classList.toggle('is-running', running);
      ringWrap.classList.toggle('is-running', running);
    }

    function pulseTime() {
      timeDisplay.classList.remove('tick');
      void timeDisplay.offsetWidth;
      timeDisplay.classList.add('tick');
    }

    function ensureAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }

    function playChime() {
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      const notes = [
        { t: 0, f: 660 },
        { t: 0.22, f: 660 },
        { t: 0.44, f: 880 },
      ];
      notes.forEach(({ t, f }) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = f;
        gain.gain.setValueAtTime(0.0001, now + t);
        gain.gain.exponentialRampToValueAtTime(0.32, now + t + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + t + 0.32);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(now + t);
        osc.stop(now + t + 0.34);
      });
    }

    function switchMode() {
      const finishedFocus = mode === 'focus';
      mode = finishedFocus ? 'break' : 'focus';
      total = mode === 'focus' ? FOCUS_SEC : BREAK_SEC;
      remaining = total;
      if (finishedFocus) playChime();
    }

    function tick() {
      remaining--;
      if (remaining <= 0) {
        switchMode();
      }
      updateDisplay();
      pulseTime();
    }

    function setButtons() {
      startBtn.disabled = running;
      stopBtn.disabled = !running;
    }

    function start() {
      if (running) return;
      ensureAudio();
      running = true;
      timerId = setInterval(tick, 1000);
      setButtons();
      updateDisplay();
    }

    function stop() {
      running = false;
      clearInterval(timerId);
      setButtons();
      updateDisplay();
    }

    function reset() {
      running = false;
      clearInterval(timerId);
      mode = 'focus';
      total = FOCUS_SEC;
      remaining = FOCUS_SEC;
      setButtons();
      updateDisplay();
    }

    startBtn.addEventListener('click', start);
    stopBtn.addEventListener('click', stop);
    resetBtn.addEventListener('click', reset);

    setButtons();
    updateDisplay();
  </script>

</body>
</html>
